name: CI

on:
  pull_request:
    branches: [ develop, qa, main ]
  push:
    branches: [ develop, qa, main ]
  workflow_dispatch:

# Necesario para subir SARIF (Trivy/Gitleaks/CodeQL) y leer el repo
permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  # Ajusta si cambias el módulo
  APP_DIR: Backend/Java/ms-voucher

jobs:
  build-test:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Ensure mvnw is executable (si existe)
        run: |
          if [ -f "${{ env.APP_DIR }}/mvnw" ]; then
            chmod +x "${{ env.APP_DIR }}/mvnw"
          fi

      - name: Build & Unit Tests
        run: |
          if [ -f "${{ env.APP_DIR }}/mvnw" ]; then
            (cd "${{ env.APP_DIR }}" && ./mvnw -B -DskipTests=false clean verify)
          else
            mvn -B -f "${{ env.APP_DIR }}/pom.xml" -DskipTests=false clean verify
          fi

      - name: Upload test reports (surefire)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: ${{ env.APP_DIR }}/target/surefire-reports
          if-no-files-found: ignore
          retention-days: 7

      - name: JaCoCo HTML (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html
          path: ${{ env.APP_DIR }}/target/site/jacoco
          if-no-files-found: ignore
          retention-days: 7

      - name: JaCoCo coverage summary
        if: always()
        shell: bash
        run: |
          XML="${{ env.APP_DIR }}/target/site/jacoco/jacoco.xml"
          EXEC="${{ env.APP_DIR }}/target/jacoco.exec"
          SR="${{ env.APP_DIR }}/target/surefire-reports"

          echo "## JaCoCo coverage summary" >> $GITHUB_STEP_SUMMARY
          if [ -f "$XML" ]; then
            # cálculo simple de cobertura por líneas
            PCT=$(awk -F'"' '
              /<counter type="LINE"/ { miss=$6; cov=$4; m+=miss; c+=cov }
              END { t=m+c; if (t==0) print "0.00"; else printf "%.2f", (c*100)/t }
            ' "$XML")
            echo "- ✅ Encontrado **jacoco.xml**: \`$XML\`" >> $GITHUB_STEP_SUMMARY
            echo "- Line coverage: **$PCT%**" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ JaCoCo (jacoco.xml no encontrado)" >> $GITHUB_STEP_SUMMARY
            if [ -f "$EXEC" ]; then
              echo "  - ✅ \`jacoco.exec\` presente: \`$EXEC\` (si falta el XML, probablemente no corrió el goal **report**)." >> $GITHUB_STEP_SUMMARY
            fi
          fi
          if [ -d "$SR" ]; then
            CNT=$(ls -1 "$SR" | wc -l)
            echo "- Surefire reports: **$CNT** archivos en \`$SR\`" >> $GITHUB_STEP_SUMMARY
          fi

  trivy-deps:
    name: Trivy SCA (deps)
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- SARIF (para Security tab) y gating (HIGH/CRITICAL) ---
      - name: Trivy deps → SARIF (gating HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: ${{ env.APP_DIR }}
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-dirs: ${{ env.APP_DIR }}/target
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'   # falla si encuentra HIGH/CRITICAL

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # --- HTML completo para descarga/consulta (no bloquea) ---
      - name: Crear carpeta de reportes
        if: always()
        run: mkdir -p reports

      - name: Trivy deps → HTML (completo, informativo)
        if: always()
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: ${{ env.APP_DIR }}
          vuln-type: library
          # en HTML incluimos todos los niveles para que sea completo
          severity: CRITICAL,HIGH,MEDIUM,LOW
          ignore-unfixed: true
          skip-dirs: ${{ env.APP_DIR }}/target
          format: template
          template: '@/contrib/html.tpl'
          output: reports/trivy-deps.html
          exit-code: '0'   # NO bloquea el job

      - name: Subir reporte HTML (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-deps-html
          path: reports/trivy-deps.html
          retention-days: 14

      - name: Summary Trivy
        if: always()
        run: |
          echo "### Trivy SCA — Reportes" >> $GITHUB_STEP_SUMMARY
          echo "- **SARIF** visible en *Security → Code scanning alerts*." >> $GITHUB_STEP_SUMMARY
          echo "- **HTML** descargable en *Artifacts → trivy-deps-html*." >> $GITHUB_STEP_SUMMARY

  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks scan (SARIF)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          report_format: sarif
          report_path: gitleaks.sarif
          redact: true
          # el action falla automáticamente si encuentra secretos

      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif

      - name: Summary Gitleaks
        if: always()
        run: |
          echo "### Gitleaks — Secret scan" >> $GITHUB_STEP_SUMMARY
          echo "- Revisa *Security → Secret scanning* y el SARIF subido." >> $GITHUB_STEP_SUMMARY

  codeql:
    name: CodeQL (warning-only)
    runs-on: ubuntu-latest
    # Solo en PR y sin bloquear (warning)
    if: ${{ github.event_name == 'pull_request' }}
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

      - name: Summary CodeQL
        if: always()
        run: |
          echo "### CodeQL (warning-only)" >> $GITHUB_STEP_SUMMARY
          echo "Los hallazgos aparecen en *Security → Code scanning alerts*." >> $GITHUB_STEP_SUMMARY
