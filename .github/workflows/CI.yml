name: CI

on:
  push:
  pull_request:
    branches: [develop, staging, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  APP_DIR: "Backend/Java/ms-voucher"   # carpeta donde vive tu pom.xml

jobs:
  build-test:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Ensure mvnw is executable
        run: if [ -f "${{ env.APP_DIR }}/mvnw" ]; then chmod +x "${{ env.APP_DIR }}/mvnw"; fi

      - name: Build & Unit Tests
        id: mvn_build
        working-directory: ${{ env.APP_DIR }}
        run: |
          if [ -f "./mvnw" ]; then
            ./mvnw -B -ntp clean verify
          else
            mvn -B -ntp clean verify
          fi

      - name: Upload JAR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: ${{ env.APP_DIR }}/target/*.jar
          if-no-files-found: warn
          retention-days: 7

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            ${{ env.APP_DIR }}/target/surefire-reports/**
            ${{ env.APP_DIR }}/target/failsafe-reports/**
          retention-days: 7

      - name: Summary (Build & Test ✅)
        if: success()
        run: |
          {
            echo "### ✅ Build & Test (Maven)";
            echo "";
            echo "- Módulo: \`${{ env.APP_DIR }}\`";
            echo "- Estado: **OK**";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summary (Build & Test ❌)
        if: failure()
        run: |
          {
            echo "### ❌ Build & Test (Maven)";
            echo "";
            echo "- Módulo: \`${{ env.APP_DIR }}\`";
            echo "- Estado: **FAIL** — ver logs del paso *Build & Unit Tests*";
          } >> "$GITHUB_STEP_SUMMARY"

  # Solo en PR y en repos públicos (en privados requiere GHAS)
  dependency-review:
    name: Dependency Review (PR)
    if: ${{ github.event_name == 'pull_request' && github.repository_visibility == 'public' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - id: dep_review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: true
      - name: Summary (Dependency Review)
        if: always()
        run: |
          OUTCOME="${{ steps.dep_review.outcome }}"
          STATUS="CHECK"
          if [ "$OUTCOME" = "success" ]; then STATUS="OK"; fi
          {
            echo "### 🧩 Dependency Review";
            echo "";
            echo "- Estado: **$STATUS**";
            echo "- Resultado del paso: **$OUTCOME**";
            echo "- Ver conversación del PR para el comentario auto-generado (si aplica).";
          } >> "$GITHUB_STEP_SUMMARY"

  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Gitleaks scan
        id: gitleaks_scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # requerido para PRs
        with:
          version: latest
          args: --verbose --redact --exit-code 1 --report-format sarif --report-path gitleaks.sarif

      - name: Upload Gitleaks SARIF (public repos)
        if: ${{ github.repository_visibility == 'public' && always() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif

      - name: Summary (Gitleaks)
        if: always()
        run: |
          OUTCOME="${{ steps.gitleaks_scan.outcome }}"
          ICON="✅"; MSG="No se detectaron secretos expuestos."
          if [ "$OUTCOME" != "success" ]; then ICON="❌"; MSG="Se detectaron posibles secretos — revisar logs/SARIF." ; fi
          {
            echo "### $ICON Secret Scan (Gitleaks)";
            echo "";
            echo "- Estado: **$OUTCOME**";
            echo "- $MSG";
          } >> "$GITHUB_STEP_SUMMARY"

  # ---- SCA con Trivy + resumen en PR y Code Scanning ----
  trivy-sca:
    name: Trivy SCA (deps)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write       # subir SARIF al Security tab (repos públicos)
      pull-requests: write         # comentar/actualizar comentario en PR
      actions: read
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # 1) Trivy en JSON (no falla) para poder resumir y comentar
      - name: Trivy scan (JSON)
        id: trivy_json
        uses: aquasecurity/trivy-action@0.24.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          scan-type: fs
          scan-ref: ${{ env.APP_DIR }}     # Backend/Java/ms-voucher
          vuln-type: 'library'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          skip-dirs: 'target'
          format: 'json'
          output: 'trivy.json'
          exit-code: '0'                   # no fallar aquí

      # 2) Trivy en SARIF (no falla) para Security tab
      - name: Trivy scan (SARIF)
        id: trivy_sarif
        uses: aquasecurity/trivy-action@0.24.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          scan-type: fs
          scan-ref: ${{ env.APP_DIR }}
          vuln-type: 'library'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          skip-dirs: 'target'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'                   # no fallar aquí

      - name: Upload SARIF to Security tab (public repos)
        if: ${{ github.repository_visibility == 'public' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # 3) Resumen Markdown + comentario en PR + gate (falla si hay HIGH/CRITICAL)
      - name: Summarize Trivy results and comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- TRIVY-SCA-SUMMARY -->';
            const path = 'trivy.json';

            if (!fs.existsSync(path)) {
              core.info('No trivy.json found; skipping summary.');
              return;
            }

            const data = JSON.parse(fs.readFileSync(path, 'utf8'));

            // Extraer HIGH/CRITICAL
            const vulns = [];
            for (const r of (data.Results || [])) {
              for (const v of (r.Vulnerabilities || [])) {
                if (['HIGH','CRITICAL'].includes(v.Severity)) {
                  vulns.push({
                    severity: v.Severity,
                    id: v.VulnerabilityID || '',
                    pkg: v.PkgName || '',
                    installed: v.InstalledVersion || '',
                    fixed: v.FixedVersion || '-',
                    url: v.PrimaryURL || (v.References && v.References[0]) || ''
                  });
                }
              }
            }

            const totalHigh = vulns.filter(x => x.severity === 'HIGH').length;
            const totalCritical = vulns.filter(x => x.severity === 'CRITICAL').length;
            const total = vulns.length;

            const top = vulns
              .sort((a,b) => (a.severity === 'CRITICAL' ? -1 : 1))
              .slice(0, 10);

            const rows = top.map(v =>
              `| ${v.severity} | ${v.pkg} | ${v.installed} | ${v.fixed} | [${v.id}](${v.url}) |`
            ).join('\n');

            const md = `${marker}
            ### 🔒 Trivy SCA — Resumen de vulnerabilidades
            **HIGH:** ${totalHigh} · **CRITICAL:** ${totalCritical} · **Total:** ${total}

            ${total === 0 ? '✅ No se detectaron vulnerabilidades HIGH/CRITICAL.' : `
            **Top hallazgos (máx 10):**
            | Sev | Paquete | Versión | Fijo en | CVE/ID |
            |---|---|---:|---:|---|
            ${rows}
            `}

            _Fuente: análisis de dependencias (filesystem) en \`${process.env.APP_DIR}\`._`;

            // Summary del job
            await core.summary.addRaw(md).write();

            // Comentario en PR: actualiza si existe, si no crea uno nuevo
            if (context.eventName === 'pull_request') {
              const { owner, repo } = context.repo;
              const issue_number = context.payload.pull_request.number;
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number, per_page: 100
              });
              const prev = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));
              if (prev) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: prev.id, body: md });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body: md });
              }
            }

            // Gate: falla si hay HIGH/CRITICAL
            if (total > 0) {
              core.setFailed(`Trivy found ${total} HIGH/CRITICAL vulnerabilities (HIGH=${totalHigh}, CRITICAL=${totalCritical}).`);
            }

  spotbugs:
    name: SpotBugs (SAST ligero)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: SpotBugs report (audit)
        id: spotbugs_run
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B com.github.spotbugs:spotbugs-maven-plugin:4.8.6.4:spotbugs || true
      - name: Summary (SpotBugs)
        if: always()
        run: |
          FILE="${{ env.APP_DIR }}/target/spotbugsXml.xml"
          COUNT=0
          [ -f "$FILE" ] && COUNT=$(grep -c "<BugInstance" "$FILE" || true)
          ICON="✅"; MSG="0 hallazgos"
          if [ "$COUNT" -gt 0 ]; then ICON="⚠️"; MSG="$COUNT hallazgos (ver artifact HTML/XML)"; fi
          {
            echo "### $ICON SpotBugs";
            echo "";
            echo "- $MSG";
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload SpotBugs artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-spotbugs
          path: |
            ${{ env.APP_DIR }}/target/spotbugsXml.xml
            ${{ env.APP_DIR }}/target/spotbugs.html

  pmd-checkstyle:
    name: PMD & Checkstyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: PMD (audit)
        id: pmd_run
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B org.apache.maven.plugins:maven-pmd-plugin:3.21.2:pmd || true
      - name: Checkstyle (audit - Google)
        id: checkstyle_run
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B org.apache.maven.plugins:maven-checkstyle-plugin:3.3.1:checkstyle -Dcheckstyle.configLocation=google_checks.xml || true
      - name: Summary (PMD & Checkstyle)
        if: always()
        run: |
          PMD_FILE="${{ env.APP_DIR }}/target/pmd.xml"
          CK_FILE="${{ env.APP_DIR }}/target/checkstyle-result.xml"
          PMD_COUNT=0; CK_COUNT=0
          [ -f "$PMD_FILE" ] && PMD_COUNT=$(grep -c "<violation" "$PMD_FILE" || true)
          [ -f "$CK_FILE" ] && CK_COUNT=$(grep -c "<error " "$CK_FILE" || true)
          {
            echo "### 🧹 PMD & Checkstyle";
            echo "";
            echo "- PMD: **$PMD_COUNT** violaciones";
            echo "- Checkstyle: **$CK_COUNT** errores";
            echo "";
            echo "_Ver artifacts HTML/XML para detalle._";
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload PMD/Checkstyle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-pmd-checkstyle
          path: |
            ${{ env.APP_DIR }}/target/site/pmd.html
            ${{ env.APP_DIR }}/target/site/checkstyle.html
            ${{ env.APP_DIR }}/target/pmd.xml
            ${{ env.APP_DIR }}/target/checkstyle-result.xml

  jacoco:
    name: JaCoCo coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Generate coverage (audit)
        id: jacoco_run
        working-directory: ${{ env.APP_DIR }}
        run: |
          mvn -B org.jacoco:jacoco-maven-plugin:0.8.11:prepare-agent test org.jacoco:jacoco-maven-plugin:0.8.11:report || true
      - name: Summary (JaCoCo)
        if: always()
        run: |
          XML="${{ env.APP_DIR }}/target/site/jacoco/jacoco.xml"
          if [ -f "$XML" ]; then
            LINE=$(grep -o '<counter type="LINE"[^/]*/>' "$XML" | head -1 || true)
            MISSED=$(echo "$LINE" | sed -n 's/.*missed="\([0-9]*\)".*/\1/p')
            COVERED=$(echo "$LINE" | sed -n 's/.*covered="\([0-9]*\)".*/\1/p')
            if [ -n "$MISSED" ] && [ -n "$COVERED" ]; then
              TOTAL=$((MISSED + COVERED))
              if [ "$TOTAL" -gt 0 ]; then
                PCT=$(awk "BEGIN {printf \"%.2f\", (100*$COVERED)/$TOTAL}")
                echo "### ✅ JaCoCo (Line coverage: $PCT%)" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "### ⚠️ JaCoCo (sin datos de cobertura)" >> "$GITHUB_STEP_SUMMARY"
              fi
            else
              echo "### ⚠️ JaCoCo (no se pudo parsear jacoco.xml)" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "### ⚠️ JaCoCo (jacoco.xml no encontrado)" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-jacoco
          path: ${{ env.APP_DIR }}/target/site/jacoco/**
